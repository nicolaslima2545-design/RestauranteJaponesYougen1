</head>

<body>

    <div class="WRAPPER">

        <div class="boxLOGO">
            <img src="IMAGENS/logo.png" class="tamLOGO" title="Logo" alt="imagem logo"> 
        </div>
        
        <div class="boxMENU">
            <nav>
                <ul>
                    <li> <a href="index.html"> Home </a></li>

                    <li> <a href="quemsomos.html"> O yügen </a></li>
                    <li> <a href="contatos.html" class="botao"> Contato </a></li>
                </ul>
            </nav> 

        </div>

        <div class="boxQuemsomos">
            <img src="IMAGENS/RESTAURANTE_QUEMSOMOS.avif" class="BOXquemimg" alt="img cardapio" title="Restaurante">
        </div>


        <div class="boxFormulario" title="formulario">
    
       <form method="post" id="FContato" action="mailto:empresaX@gmail.com">
    <p> 
    <label for="cNome"> Nome: </label> <br>
    <input type="text" name="tNome" id="cNome" size="40" maxlength="30" autofocus required />
    </p> 


    <p>
    <label for="cRua">Endereço:</label><br>
    <input type="text" name="tRua" id="cRua" size="40" maxlength="50"  placeholder="Rua, Av, Trav,..." required />
    </p>

    <p>
    <label for="cTel"> Telefone:</label><br>
    <input type="tel" name="tTel" id="cTel" size="40" maxlength="30" placeholder="(11) 12345-6789"  required />
    </p>
         
    <p>
    <label for="cMail"> E-mail:</label><br>
    <input type="email" name="tMail" id="cMail" size="40" maxlength="30"  required />
    </p>
    
    <p>
    <label for="cReserva"> Faça sua reserva:</label><br>
    <input type="date" name="tData" id="cData" size="40" maxlength="30"  required />
    </p>       
    
    <p>
    <label for="cMsg">Mensagem:</label><br>
    <textarea name="tMsg" id="cMsg" cols="40" rows="5" placeholder="Deixe aqui sua mensagem">
    </textarea>  
     </p>
    

 
    <input type="submit" name="Enviar" class="botaoFormulario" style="padding:10px 15px 10px 15px; border-radius:10px;border-color: #ffffff;"/> 
  
    </form> 

        </div>


        <div class="boxRedes">
            <img src="IMAGENS/Facebook.png" class="Redes" alt="Redes sociais" title="Facebook">
            <img src="IMAGENS/Instagram.png" class="Redes" alt="Redes sociais" title="Instagram">
            <img src="IMAGENS/WhatsApp.png" class="Redes" alt="Redes sociais" title="WhatsApp">

        </div>

        <div class="boxRodape">
            Todos os direitos reservados - 2026
        </div>




    </div>

    



</body>




</html>
